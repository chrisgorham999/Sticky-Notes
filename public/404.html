<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Stock Stickies</title>
    <meta name="description" content="The page you're looking for doesn't exist. Head back to Stock Stickies to track your stock positions." />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="/assets/stock-stickies-favicon.svg" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background-color: #111827;
        color: #d1d5db;
        font-family: ui-sans-serif, system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        overflow: hidden;
      }

      /* Subtle grid background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0,255,65,.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,255,65,.04) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 560px;
        width: 100%;
      }

      /* Brand header */
      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 2.5rem;
      }

      .brand-text { display: flex; flex-direction: column; line-height: 1; }

      .brand-stock {
        font-family: monospace;
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: -.02em;
        color: #00ff41;
      }

      .brand-stickies {
        font-family: monospace;
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: .2em;
        color: #ff2bd6;
        margin-top: -.1em;
      }

      /* Sticky note cluster */
      .notes-cluster {
        position: relative;
        height: 160px;
        margin: 0 auto 2rem;
        width: 260px;
      }

      .sticky {
        position: absolute;
        width: 110px;
        height: 110px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: monospace;
        font-weight: 900;
        box-shadow: 3px 3px 12px rgba(0,0,0,.5);
      }

      .sticky-404 {
        background: linear-gradient(135deg, #fde68a, #fbbf24);
        color: #92400e;
        font-size: 2.25rem;
        top: 10px;
        left: 50%;
        transform: translateX(-50%) rotate(-3deg);
        z-index: 3;
      }

      .sticky-left {
        background: linear-gradient(135deg, #bbf7d0, #4ade80);
        color: #14532d;
        font-size: .7rem;
        top: 35px;
        left: 8px;
        transform: rotate(6deg);
        z-index: 2;
        padding: .5rem;
        text-align: left;
        line-height: 1.6;
      }

      .sticky-right {
        background: linear-gradient(135deg, #f9a8d4, #ec4899);
        color: #831843;
        font-size: .7rem;
        top: 40px;
        right: 8px;
        transform: rotate(-5deg);
        z-index: 2;
        padding: .5rem;
        text-align: left;
        line-height: 1.6;
      }

      .sticky-line {
        display: block;
        border-bottom: 1.5px solid rgba(0,0,0,.15);
        margin-bottom: 4px;
        padding-bottom: 2px;
      }

      /* 404 headline */
      .headline {
        font-size: 1.4rem;
        font-weight: 700;
        color: #f9fafb;
        margin-bottom: .6rem;
      }

      .subline {
        font-size: .95rem;
        color: #9ca3af;
        margin-bottom: 2rem;
        line-height: 1.6;
      }

      /* Mini "chart" decoration */
      .chart-bar {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 5px;
        height: 40px;
        margin-bottom: 2rem;
        opacity: .35;
      }

      .bar {
        width: 10px;
        border-radius: 2px 2px 0 0;
        background: #00ff41;
      }

      /* CTA button */
      .btn {
        display: inline-block;
        background: #1a1a2e;
        border: 2px solid #00ff41;
        color: #00ff41;
        font-family: monospace;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: .05em;
        text-decoration: none;
        padding: .75rem 2rem;
        border-radius: .5rem;
        transition: background .15s, color .15s, box-shadow .15s;
        box-shadow: 0 0 12px rgba(0,255,65,.15);
      }

      .btn:hover {
        background: #00ff41;
        color: #0a0a0a;
        box-shadow: 0 0 24px rgba(0,255,65,.4);
      }

      /* Footer */
      .footer {
        margin-top: 3rem;
        font-size: .75rem;
        color: #4b5563;
      }

      .footer a { color: #6b7280; text-decoration: none; }
      .footer a:hover { color: #9ca3af; }
    </style>
  </head>
  <body>
    <div class="container">

      <!-- Brand -->
      <div class="brand">
        <svg width="52" height="52" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="44" height="44" rx="4" fill="#1a1a2e" stroke="#00ff9f" stroke-width="2"/>
          <path d="M8 32 L16 20 L22 26 L32 12 L40 18" stroke="#39ff14" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="20" r="3" fill="#39ff14"/>
          <circle cx="32" cy="12" r="3" fill="#39ff14"/>
          <rect x="6"  y="36" width="8" height="6"  fill="#39ff14" opacity="0.7"/>
          <rect x="16" y="33" width="8" height="9"  fill="#39ff14" opacity="0.8"/>
          <rect x="26" y="30" width="8" height="12" fill="#39ff14" opacity="0.9"/>
          <rect x="36" y="34" width="6" height="8"  fill="#39ff14" opacity="0.6"/>
        </svg>
        <div class="brand-text">
          <span class="brand-stock">STOCK</span>
          <span class="brand-stickies">STICKIES</span>
        </div>
      </div>

      <!-- Sticky note visual -->
      <div class="notes-cluster" aria-hidden="true">
        <div class="sticky sticky-left">
          <span class="sticky-line">AAPL</span>
          <span class="sticky-line">MSFT</span>
          <span class="sticky-line">NVDA</span>
        </div>
        <div class="sticky sticky-right">
          <span class="sticky-line">TSLA</span>
          <span class="sticky-line">AMZN</span>
          <span class="sticky-line">GOOG</span>
        </div>
        <div class="sticky sticky-404">404</div>
      </div>

      <!-- Message -->
      <h1 class="headline">This page doesn't exist.</h1>
      <p class="subline">
        Looks like that ticker went delisted.<br>
        Head back to your portfolio and keep tracking.
      </p>

      <!-- Decorative chart bars -->
      <div class="chart-bar" aria-hidden="true">
        <div class="bar" style="height:18px"></div>
        <div class="bar" style="height:28px"></div>
        <div class="bar" style="height:14px"></div>
        <div class="bar" style="height:36px"></div>
        <div class="bar" style="height:22px"></div>
        <div class="bar" style="height:8px"></div>
        <div class="bar" style="height:32px"></div>
        <div class="bar" style="height:20px; background:#ff2bd6"></div>
      </div>

      <a href="/" class="btn">↩ Back to Stock Stickies</a>

      <p class="footer">
        &copy; 2026 Stock Stickies &nbsp;·&nbsp;
        <a href="https://www.easternshore.ai" target="_blank" rel="noopener">Eastern Shore AI, LLC</a>
      </p>
    </div>
  </body>
</html>
